<!DOCTYPE html>
<html lang="en" data-v6-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NOVASPARK V6 · Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0d14;--panel:#111827;--panel2:#1a2235;--panel3:#1f2a3d;--border:#1f2d42;--border2:#172032;
      --accent:#2563eb;--accent2:#3b82f6;--accent-glow:rgba(37,99,235,0.2);
      --green:#22c55e;--green-dim:rgba(34,197,94,0.12);--green-b:rgba(34,197,94,0.3);
      --red:#ef4444;--red-dim:rgba(239,68,68,0.12);--red-b:rgba(239,68,68,0.3);
      --gold:#f59e0b;--gold-dim:rgba(245,158,11,0.12);--gold-b:rgba(245,158,11,0.3);
      --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--blue-b:rgba(96,165,250,0.3);
      --purple:#8b5cf6;
      --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#475569;
      --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--radius:8px;
      --sidebar-w:220px;
    }
    html{height:100%}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex}
    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200}
    .sidebar-logo{padding:18px 16px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
    .sidebar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 12px var(--accent-glow)}
    .sidebar-logo-text{font-size:16px;font-weight:700;letter-spacing:-0.3px;line-height:1.1}
    .sidebar-logo-text span{color:var(--accent2)}
    .sidebar-logo-badge{display:block;font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:2px}
    .sidebar-section{padding:6px 8px}
    .sidebar-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:8px 8px 4px;font-family:var(--mono)}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.15s;margin-bottom:2px}
    .nav-item:hover{background:var(--panel2);color:var(--text)}
    .nav-item.active{background:rgba(37,99,235,0.15);color:var(--accent2);border:1px solid rgba(37,99,235,0.2)}
    .nav-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
    .notif-dot{width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:auto;animation:blink 2s infinite;display:none}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border2)}
    .user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px}
    .user-pill-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .user-pill-name{font-size:13px;font-weight:600}
    .user-pill-role{font-size:10px;color:var(--text-dim);font-family:var(--mono)}
    .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
    .topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;gap:12px}
    .topbar-breadcrumb{font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
    .topbar-breadcrumb span{color:var(--text);font-weight:600}
    .topbar-actions{display:flex;align-items:center;gap:8px}
    .coin-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--gold-dim);border:1px solid var(--gold-b);border-radius:999px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--gold)}
    .page{padding:24px;flex:1;max-width:720px}
    .page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
    .page-title{font-size:18px;font-weight:700}
    .unread-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--red);color:#fff;border-radius:50%;font-size:11px;font-weight:700;font-family:var(--mono);animation:blink 2s infinite}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:none;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
    .btn-secondary{background:var(--panel2);color:var(--text-dim);border:1px solid var(--border)}
    .btn-secondary:hover{color:var(--text);border-color:var(--accent)}
    .btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red-b)}
    .notif-list{display:flex;flex-direction:column;gap:10px}
    .notif-item{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--panel);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;animation:notifIn 0.4s cubic-bezier(0.16,1,0.3,1) both;position:relative;overflow:hidden}
    .notif-item.unread{border-left:3px solid var(--accent)}
    .notif-item.unread::before{content:'';position:absolute;inset:0;background:rgba(37,99,235,0.04);pointer-events:none}
    .notif-item:hover{border-color:var(--accent);transform:translateX(4px)}
    @keyframes notifIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .notif-icon-wrap{width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .notif-content{flex:1;min-width:0}
    .notif-title{font-size:13px;font-weight:600;margin-bottom:4px}
    .notif-body{font-size:12px;color:var(--text-dim);font-family:var(--mono);line-height:1.5}
    .notif-ts{font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-top:6px}
    .notif-actions{display:flex;gap:6px;flex-shrink:0}
    .notif-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--panel2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
    .notif-btn:hover{background:var(--red-dim);color:var(--red)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);font-family:var(--mono)}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
    .empty-text{font-size:13px}
    .skeleton{background:linear-gradient(90deg,var(--panel2) 25%,var(--panel3) 50%,var(--panel2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">⚡</div>
      <div>
        <div class="sidebar-logo-text">NOVA<span>SPARK</span></div>
        <span class="sidebar-logo-badge">V6.0.0</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="/"><span class="nav-item-icon">📊</span>Dashboard</a>
      <a class="nav-item" href="/panel-bots.html"><span class="nav-item-icon">🤖</span>Panel Bots</a>
      <a class="nav-item" href="/bot-features.html"><span class="nav-item-icon">⚙️</span>Bot Features</a>
      <a class="nav-item" href="/leaderboard.html"><span class="nav-item-icon">🏆</span>Leaderboard</a>
      <a class="nav-item active" href="/notifications.html"><span class="nav-item-icon">🔔</span>Notifications <span class="notif-dot" id="nav-dot"></span></a>
      <a class="nav-item" href="/profile.html"><span class="nav-item-icon">👤</span>Profile</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-pill-avatar" id="sb-avatar">👤</div>
        <div>
          <div class="user-pill-name" id="sb-name">—</div>
          <div class="user-pill-role" id="sb-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-breadcrumb">Dashboard <span style="color:var(--text-muted);margin:0 4px">/</span> <span>🔔 Notifications</span></div>
      <div class="topbar-actions">
        <div class="coin-chip">🪙 <span id="top-coins">—</span></div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="page">
      <div class="page-hdr">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="page-title">Notifications</span>
          <span class="unread-badge" id="unread-badge" style="display:none">0</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" onclick="markAllRead()">✅ Mark all read</button>
          <button class="btn btn-danger" onclick="clearAll()">🗑 Clear all</button>
        </div>
      </div>

      <div id="notif-list">
        <div class="skeleton" style="height:80px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:80px;margin-bottom:10px;opacity:0.7"></div>
        <div class="skeleton" style="height:80px;opacity:0.4"></div>
      </div>
    </div>
  </div>

  <script>
    const token=localStorage.getItem('ns_token');
    if(!token){window.location.href='/login.html';}
    const hdr={'Authorization':'Bearer '+token,'Content-Type':'application/json'};

    async function loadNotifs(){
      try{
        const [me,nr]=await Promise.all([
          fetch('/api/auth/me',{headers:hdr}),
          fetch('/api/notifications',{headers:hdr})
        ]);
        if(!me.ok){window.location.href='/login.html';return;}
        const u=await me.json();
        document.getElementById('sb-avatar').textContent=(u.username||'?')[0].toUpperCase();
        document.getElementById('sb-name').textContent=u.username;
        document.getElementById('sb-role').textContent=u.role;
        document.getElementById('top-coins').textContent=u.coins||0;

        const notes=await nr.json();
        const unread=notes.filter(n=>!n.read).length;
        const badge=document.getElementById('unread-badge');
        const dot=document.getElementById('nav-dot');
        if(unread>0){badge.style.display='flex';badge.textContent=unread;dot.style.display='block';}
        else{badge.style.display='none';dot.style.display='none';}
        renderNotifs(notes);
      }catch{document.getElementById('notif-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load notifications.</div></div>';}
    }

    function timeAgo(ts){
      const s=Math.floor((Date.now()-new Date(ts))/1000);
      if(s<60)return 'Just now';if(s<3600)return Math.floor(s/60)+'m ago';
      if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
    }

    function renderNotifs(notes){
      const el=document.getElementById('notif-list');
      if(!notes.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🔕</div><div class="empty-text">No notifications yet.<br>Bot events and rewards will appear here.</div></div>';return;}
      el.innerHTML='<div class="notif-list">'+notes.map((n,i)=>`
        <div class="notif-item ${n.read?'':'unread'}" style="animation-delay:${i*0.05}s" id="n-${n.id}">
          <div class="notif-icon-wrap">${n.icon||'🔔'}</div>
          <div class="notif-content" onclick="markRead('${n.id}')">
            <div class="notif-title">${n.title}</div>
            <div class="notif-body">${n.body}</div>
            <div class="notif-ts">${timeAgo(n.createdAt)}</div>
          </div>
          <div class="notif-actions">
            <button class="notif-btn" onclick="deleteNotif('${n.id}')" title="Delete">🗑</button>
          </div>
        </div>`).join('')+'</div>';
    }

    async function markRead(id){
      await fetch('/api/notifications/read',{method:'POST',headers:hdr,body:JSON.stringify({id})});
      const el=document.getElementById('n-'+id);
      if(el)el.classList.remove('unread');
      loadNotifs();
    }

    async function markAllRead(){
      await fetch('/api/notifications/read',{method:'POST',headers:hdr,body:JSON.stringify({})});
      loadNotifs();
    }

    async function deleteNotif(id){
      const el=document.getElementById('n-'+id);
      if(el){el.style.opacity='0';el.style.transform='translateX(20px)';el.style.transition='all 0.3s';setTimeout(()=>el.remove(),300);}
      await fetch('/api/notifications/'+id,{method:'DELETE',headers:hdr});
    }

    async function clearAll(){
      const notes=document.querySelectorAll('.notif-item');
      notes.forEach(n=>{n.style.transition='all 0.3s';n.style.opacity='0';n.style.transform='translateX(20px)';});
      setTimeout(()=>loadNotifs(),400);
    }

    function logout(){localStorage.removeItem('ns_token');localStorage.removeItem('ns_user');window.location.href='/login.html';}

    // Real-time via WebSocket
    const ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
    ws.onmessage=e=>{try{const d=JSON.parse(e.data);if(d.type==='notification')loadNotifs();}catch{}};

    loadNotifs();
  </script>
</body>
</html>
