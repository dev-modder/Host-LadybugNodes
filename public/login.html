<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVASPARK V5 · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d1117; --panel:#161b22; --panel2:#1c2333; --border:#30363d; --border2:#21262d;
      --accent:#1f6feb; --accent2:#388bfd; --accent-glow:rgba(31,111,235,0.25);
      --green:#3fb950; --green-dim:rgba(63,185,80,0.12);
      --red:#f85149; --red-dim:rgba(248,81,73,0.12);
      --amber:#d29922; --cyan:#39c5cf; --cyan-dim:rgba(57,197,207,0.12);
      --text:#e6edf3; --text-dim:#8b949e; --text-muted:#484f58;
      --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --radius:8px;
    }
    html { height:100%; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:0; background-image:linear-gradient(var(--border2) 1px,transparent 1px),linear-gradient(90deg,var(--border2) 1px,transparent 1px); background-size:40px 40px; mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%); opacity:0.4; }
    body::after { content:''; position:fixed; top:-20%; left:50%; transform:translateX(-50%); width:700px; height:500px; z-index:0; background:radial-gradient(ellipse,rgba(31,111,235,0.12) 0%,transparent 70%); pointer-events:none; }
    .login-wrap { position:relative; z-index:1; width:100%; max-width:420px; padding:20px; }
    .site-logo { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:28px; }
    .site-logo-icon { width:42px; height:42px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 20px var(--accent-glow); }
    .site-logo-text { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
    .site-logo-text span { color:var(--accent2); }
    .site-logo-badge { font-family:var(--mono); font-size:9px; font-weight:600; background:var(--panel2); border:1px solid var(--border); padding:2px 7px; border-radius:4px; color:var(--text-dim); margin-left:6px; vertical-align:middle; }
    .status-bar { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:18px; font-family:var(--mono); font-size:11px; color:var(--text-dim); }
    .status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .login-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03); }
    .login-card-header { padding:20px 24px 16px; border-bottom:1px solid var(--border2); background:var(--panel2); }
    .login-card-header h2 { font-size:16px; font-weight:600; margin-bottom:4px; }
    .login-card-header p { font-size:12px; color:var(--text-dim); font-family:var(--mono); }
    .login-card-body { padding:24px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12px; font-weight:500; color:var(--text-dim); margin-bottom:6px; font-family:var(--mono); }
    .form-input { width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--mono); font-size:14px; transition:border-color 0.15s,box-shadow 0.15s; outline:none; }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .form-input::placeholder { color:var(--text-muted); }
    .btn-login { width:100%; padding:11px; margin-top:8px; background:var(--accent); border:none; border-radius:var(--radius); color:#fff; font-family:var(--sans); font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s,box-shadow 0.15s; }
    .btn-login:hover { background:var(--accent2); box-shadow:0 0 16px var(--accent-glow); }
    .btn-login:active { transform:scale(0.99); }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .error-msg { background:var(--red-dim); border:1px solid rgba(248,81,73,0.3); border-radius:var(--radius); color:var(--red); font-family:var(--mono); font-size:12px; padding:10px 14px; margin-top:14px; display:none; }
    .error-msg.show { display:block; }
    .login-card-footer { padding:14px 24px; border-top:1px solid var(--border2); background:var(--panel2); text-align:center; }
    .signup-link { font-size:12px; color:var(--text-dim); font-family:var(--mono); }
    .signup-link a { color:var(--accent2); text-decoration:none; font-weight:600; }
    .signup-link a:hover { text-decoration:underline; }
    .footer-note { text-align:center; margin-top:20px; font-size:11px; color:var(--text-muted); font-family:var(--mono); line-height:1.8; }
    .footer-note a { color:var(--text-dim); text-decoration:none; }
    .footer-note a:hover { color:var(--text); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="site-logo">
      <div class="site-logo-icon">⚡</div>
      <div>
        <span class="site-logo-text">NOVA<span>SPARK</span></span>
        <span class="site-logo-badge">V5</span>
      </div>
    </div>
    <div class="status-bar"><span class="status-dot"></span><span>All systems operational</span></div>
    <div class="login-card">
      <div class="login-card-header">
        <h2>Sign in to your account</h2>
        <p>// Enter credentials to access the control panel</p>
      </div>
      <div class="login-card-body">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" placeholder="your_username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-login" id="login-btn" onclick="doLogin()">Authenticate →</button>
        <div class="error-msg" id="error-msg"></div>
      </div>
      <div class="login-card-footer">
        <div class="signup-link">No account? <a href="/signup.html">Create one →</a></div>
      </div>
    </div>
    <div class="footer-note">
      NOVASPARK V5 &nbsp;•&nbsp; Powered by <a href="https://render.com" target="_blank">Render.com</a><br>
      © 2025 NOVASPARK V5. All rights reserved. | <a href="/terms.html">Terms</a>
    </div>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    async function doLogin() {
      const btn=$('login-btn'), err=$('error-msg');
      const username=$('username').value.trim(), password=$('password').value.trim();
      if(!username||!password){showErr('Username and password required.');return;}
      btn.disabled=true; btn.textContent='Authenticating...'; err.classList.remove('show');
      try {
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        const d=await r.json();
        if(!r.ok){showErr(d.error||'Invalid credentials.');return;}
        localStorage.setItem('ns_token',d.token);
        localStorage.setItem('lbn_token',d.token);
        if(d.user) localStorage.setItem('lbn_user',JSON.stringify(d.user));
        window.location.href='/';
      } catch(e){showErr('Connection error. Try again.');}
      finally{btn.disabled=false;btn.textContent='Authenticate →';}
    }
    function showErr(msg){const e=$('error-msg');e.textContent='⚠ '+msg;e.classList.add('show');}
  </script>
</body>
</html>
