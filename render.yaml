services:
  - type: web
    name: novaspark-v7
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: COIN_COST_START
        value: "5"
      - key: COIN_DAILY_REWARD
        value: "2"
      - key: COIN_REFERRAL_REWARD
        value: "5"
      - key: VIP_SERVER_COST
        value: "200"
      - key: BOT_DURATION_DAYS
        value: "2"
      - key: LOG_VIEWING_MINUTES
        value: "20"
      # ── NovaSpark Bot API Keys ──────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPAI_API_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: GIPHY_API_KEY
        sync: false
      - key: CHANNEL_LINK
        sync: false
      # ── NovaSpark Bot Runtime ───────────────────────────────────────────────
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
